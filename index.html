<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    }

    .container{
      width:350px;
      background:white;
      padding:30px;
      border-radius:15px;
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    h2{
      text-align:center;
      margin-bottom:20px;
      color:#333;
    }

    input,
    textarea{
      width:100%;
      padding:12px;
      margin-top:12px;
      border:1px solid #ccc;
      border-radius:8px;
      font-size:15px;
      outline:none;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:15px;
      border:none;
      border-radius:8px;
      background:#0077ff;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#0056cc;
    }

  </style>

</head>
<body>

  <div class="container">

    <h2>Contact Form</h2>

    <form action="https://formsubmit.co/newaiwala44@gmail.com" method="POST">

      <!-- Hidden Settings -->

      <input type="hidden" name="_captcha" value="false">

      <input type="hidden" name="_subject" value="New Form Submission">

      <input type="hidden" name="_template" value="table">

      <input type="hidden" name="_next" value="https://akshay-452.github.io/">

      <!-- User Inputs -->

      <input type="text" name="name" placeholder="Your Name" required>

      <input type="email" name="email" placeholder="Your Email" required>

      <input type="text" name="phone" placeholder="Phone Number" required>

      <textarea name="message" rows="4" placeholder="Your Message"></textarea>

      <button type="submit">Submit</button>

    </form>

  </div>

</body>
</html>
